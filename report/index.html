<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>月報表 · Y's Cloud</title>
    <link rel="icon" type="image/png" href="../assets/favicon.png" />
    <link rel="stylesheet" href="../assets/style.css" />
    <style>
        /* 月報表頁面專用樣式，沿用 style.css 的色彩 token */
        .month-switch {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            margin-top: 4px;
        }

        .month-switch button {
            background: var(--paper-raised);
            border: 1.5px solid var(--line);
            border-radius: 8px;
            width: 40px;
            height: 40px;
            font-size: 18px;
            color: var(--navy);
            cursor: pointer;
        }

        .month-switch button:disabled {
            color: var(--line);
            cursor: not-allowed;
        }

        .month-switch button:not(:disabled):hover {
            border-color: var(--teal);
            color: var(--teal-deep);
        }

        .month-label {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 17px;
            color: var(--navy-deep);
            letter-spacing: 0.02em;
        }

        .summary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
            margin-top: 24px;
        }

        .summary-card {
            background: var(--paper-raised);
            border: 1.5px solid var(--line);
            border-radius: 10px;
            padding: 14px;
            text-align: center;
        }

        .summary-card .label {
            font-size: 12px;
            color: var(--muted);
            letter-spacing: 0.02em;
        }

        .summary-card .value {
            margin-top: 6px;
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 22px;
            color: var(--navy-deep);
            font-variant-numeric: tabular-nums;
        }

        .summary-card.work-total {
            grid-column: 1 / -1;
            background: var(--teal-soft);
            border-color: var(--teal);
        }

        .summary-card.work-total .value {
            color: var(--teal-deep);
        }

        /* 小日曆 */
        .calendar-section {
            width: 100%;
            margin-top: 28px;
        }

        .calendar-weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            margin-bottom: 6px;
        }

        .calendar-weekdays span {
            text-align: center;
            font-size: 11px;
            color: var(--muted);
            letter-spacing: 0.02em;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }

        .calendar-day {
            aspect-ratio: 1 / 1.05;
            border-radius: 8px;
            background: var(--paper-raised);
            border: 1px solid var(--line);
            border-left: 3px solid var(--line);
            padding: 5px 4px 4px;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        .calendar-day.pad {
            visibility: hidden;
        }

        .calendar-day.no-record {
            background: var(--paper);
            opacity: 0.55;
        }

        .calendar-day.status-ok {
            border-left-color: var(--teal);
        }

        .calendar-day.status-warn {
            border-left-color: #A23B3B;
        }

        .calendar-day .date-num {
            font-family: var(--font-display);
            font-weight: 600;
            font-size: 11px;
            color: var(--ink);
            line-height: 1;
        }

        .calendar-day .times {
            margin-top: auto;
            font-size: 8.5px;
            line-height: 1.35;
            color: var(--muted);
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.01em;
        }

        .calendar-day .times b {
            color: var(--ink);
            font-weight: 600;
        }

        .calendar-legend {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-top: 12px;
            font-size: 11px;
            color: var(--muted);
        }

        .calendar-legend span {
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .calendar-legend .dot {
            width: 8px;
            height: 8px;
            border-radius: 2px;
        }

        .calendar-legend .dot.ok { background: var(--teal); }
        .calendar-legend .dot.warn { background: #A23B3B; }
        .calendar-legend .dot.none { background: var(--line); }

        .empty-hint {
            width: 100%;
            text-align: center;
            padding: 32px 0;
            color: var(--muted);
            font-size: 13px;
        }
    </style>
</head>

<body>

    <div class="screen">

        <div class="topbar">
            <span class="brand">Y'S CLOUD</span>
            <span class="sep">·</span>
            <span class="sub">月報表</span>
        </div>

        <div class="card">

            <!-- 使用者資訊 -->
            <div class="profile">
                <div class="avatar" id="avatarBox">
                    <span class="placeholder">?</span>
                </div>
                <div class="info">
                    <div class="greeting">月報表</div>
                    <div class="name" id="userName">尚未連接</div>
                </div>
            </div>

            <div class="divider"></div>

            <!-- 月份切換 -->
            <div class="month-switch">
                <button id="btnPrevMonth" aria-label="上個月">‹</button>
                <span class="month-label" id="monthLabel">--</span>
                <button id="btnNextMonth" aria-label="下個月">›</button>
            </div>

            <!-- 總覽數字 -->
            <div class="summary-grid" id="summaryGrid">
                <div class="summary-card">
                    <div class="label">出勤天數</div>
                    <div class="value" id="sumAttendance">--</div>
                </div>
                <div class="summary-card">
                    <div class="label">遲到 / 早退天數</div>
                    <div class="value" id="sumLateEarly">--</div>
                </div>
                <div class="summary-card work-total">
                    <div class="label">本月總工時</div>
                    <div class="value" id="sumWorkTotal">--</div>
                </div>
            </div>

            <!-- 小日曆 -->
            <div class="calendar-section" id="calendarSection">
                <div class="calendar-weekdays">
                    <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
                </div>
                <div class="calendar-grid" id="calendarGrid"></div>
                <div class="calendar-legend">
                    <span><i class="dot ok"></i>正常</span>
                    <span><i class="dot warn"></i>遲到／早退</span>
                    <span><i class="dot none"></i>未打卡</span>
                </div>
            </div>

            <div class="status" id="statusBar">正在連接 LINE...</div>

        </div>
    </div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="../shared/config.js"></script>
    <script src="../shared/liff-utils.js?v=2"></script>
    <script>
        const statusBar = document.getElementById('statusBar');
        function setStatus(text, type) {
            statusBar.textContent = text;
            statusBar.className = 'status' + (type ? ' ' + type : '');
        }

        // 目前畫面顯示中的年月（不能切到比今天所在月份更未來）
        const today = new Date();
        let viewYear = today.getFullYear();
        let viewMonth = today.getMonth() + 1; // 1~12

        const monthLabel = document.getElementById('monthLabel');
        const btnPrev = document.getElementById('btnPrevMonth');
        const btnNext = document.getElementById('btnNextMonth');
        const calendarGrid = document.getElementById('calendarGrid');

        function formatMinutesAsHM(totalMinutes) {
            const h = Math.floor(totalMinutes / 60);
            const m = totalMinutes % 60;
            return `${h} 小時 ${m} 分`;
        }

        function formatHM(iso) {
            return iso ? new Date(iso).toLocaleTimeString('zh-TW', { hour12: false, hour: '2-digit', minute: '2-digit' }) : null;
        }

        function statusClass(status) {
            if (status === '遲到' || status === '早退' || status === '遲到早退') return 'status-warn';
            return 'status-ok';
        }

        function renderMonthLabel() {
            monthLabel.textContent = `${viewYear} 年 ${viewMonth} 月`;
            const isCurrentMonth = (viewYear === today.getFullYear() && viewMonth === today.getMonth() + 1);
            btnNext.disabled = isCurrentMonth;
        }

        function renderCalendar(daysData) {
            // 用日期字串當 key 快速對照
            const byDate = {};
            daysData.forEach(d => { byDate[d.date] = d; });

            const firstWeekday = new Date(viewYear, viewMonth - 1, 1).getDay(); // 0=日
            const totalDays = new Date(viewYear, viewMonth, 0).getDate();

            calendarGrid.innerHTML = '';

            // 月初前面補空白格，讓 1 號對齊正確星期欄位
            for (let i = 0; i < firstWeekday; i++) {
                const pad = document.createElement('div');
                pad.className = 'calendar-day pad';
                calendarGrid.appendChild(pad);
            }

            for (let day = 1; day <= totalDays; day++) {
                const dateStr = `${viewYear}-${String(viewMonth).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const rec = byDate[dateStr];

                const cell = document.createElement('div');
                cell.className = 'calendar-day';

                if (rec) {
                    cell.classList.add(statusClass(rec.status));
                    const inTime = formatHM(rec.checkIn);
                    const outTime = formatHM(rec.checkOut);
                    cell.innerHTML = `
                        <span class="date-num">${day}</span>
                        <span class="times">
                            ${inTime ? `上<b>${inTime}</b>` : ''}
                            ${outTime ? `<br>下<b>${outTime}</b>` : ''}
                        </span>
                    `;
                } else {
                    cell.classList.add('no-record');
                    cell.innerHTML = `<span class="date-num">${day}</span>`;
                }

                calendarGrid.appendChild(cell);
            }
        }

        function renderReport(data) {
            const s = data.summary;
            document.getElementById('sumAttendance').textContent = `${s.attendanceDays} 天`;
            document.getElementById('sumLateEarly').textContent = `${s.lateDays} / ${s.earlyDays}`;
            document.getElementById('sumWorkTotal').textContent = formatMinutesAsHM(s.totalWorkMinutes);

            renderCalendar(data.days || []);
        }

        async function loadReport() {
            renderMonthLabel();
            setStatus('讀取月報表中...', null);
            try {
                const data = await LiffUtils.getMonthlyReport(viewYear, viewMonth);
                if (data.error) {
                    setStatus(data.message || '讀取月報表失敗', 'error');
                    return;
                }
                renderReport(data);
                setStatus('', null);
                statusBar.style.opacity = '0';
            } catch (err) {
                console.error(err);
                setStatus('連線錯誤，請稍後再試', 'error');
            }
        }

        btnPrev.addEventListener('click', () => {
            viewMonth--;
            if (viewMonth < 1) { viewMonth = 12; viewYear--; }
            loadReport();
        });

        btnNext.addEventListener('click', () => {
            if (btnNext.disabled) return;
            viewMonth++;
            if (viewMonth > 12) { viewMonth = 1; viewYear++; }
            loadReport();
        });

        async function start() {
            try {
                const profile = await LiffUtils.init();
                if (!profile) return; // 正在導轉去登入

                const avatarBox = document.getElementById('avatarBox');
                if (profile.pictureUrl) {
                    avatarBox.innerHTML = `<img src="${profile.pictureUrl}" alt="頭像" />`;
                } else {
                    avatarBox.innerHTML = `<span class="placeholder">${profile.displayName.charAt(0)}</span>`;
                }
                document.querySelector('.card').classList.add('ready');
                requestAnimationFrame(() => avatarBox.classList.add('loaded'));

                setStatus('已連接 LINE，查詢綁定狀態中...', null);
                const binding = await LiffUtils.checkBinding();

                if (binding.blocked) {
                    setStatus(binding.message, 'error');
                    return;
                }
                if (!binding.bound) {
                    setStatus('尚未綁定員工資料，即將前往綁定頁面...', null);
                    setTimeout(() => { window.location.href = '../bind/index.html'; }, 800);
                    return;
                }

                LiffUtils.empId = binding.empId;
                document.getElementById('userName').textContent = binding.empName;

                await loadReport();
            } catch (err) {
                console.error(err);
                setStatus('連接失敗，請確認 LIFF 或伺服器設定', 'error');
                document.querySelector('.card').classList.add('ready');
            }
        }

        start();
    </script>

</body>

</html>
