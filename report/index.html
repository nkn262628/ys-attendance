<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>月報表 · Y's Cloud</title>
    <link rel="icon" type="image/png" href="../assets/favicon.png" />
    <link rel="stylesheet" href="../assets/style.css?v=2" />
    <link rel="stylesheet" href="report.css?v=1" />
</head>

<body>

    <div class="screen">

        <div class="topbar">
            <span class="brand">Y'S CLOUD</span>
            <span class="sep">·</span>
            <span class="sub">月報表</span>
        </div>

        <div class="card report-card">

            <!-- 使用者資訊 -->
            <div class="profile">
                <div class="avatar" id="avatarBox">
                    <span class="placeholder">?</span>
                </div>
                <div class="info">
                    <div class="greeting">月報表</div>
                    <div class="name" id="userName">尚未連接</div>
                </div>
            </div>

            <div class="divider"></div>

            <!-- 月份切換 -->
            <div class="month-switch">
                <button id="btnPrevMonth" aria-label="上個月">‹</button>
                <span class="month-label" id="monthLabel">--</span>
                <button id="btnNextMonth" aria-label="下個月">›</button>
            </div>

            <!-- 出勤率圓環 + 統計列 -->
            <div class="overview" id="overviewSection">
                <div class="rate-ring">
                    <svg viewBox="0 0 92 92">
                        <circle cx="46" cy="46" r="38" stroke="#D8DFDD" stroke-width="7" fill="none" />
                        <circle cx="46" cy="46" r="38" stroke="#1F8F86" stroke-width="7" fill="none"
                            stroke-linecap="round" stroke-dasharray="238.8" stroke-dashoffset="238.8"
                            transform="rotate(-90 46 46)" id="rateArc" />
                        <text x="46" y="44" text-anchor="middle" class="ring-num" id="rateNum">--</text>
                        <text x="46" y="58" text-anchor="middle" class="ring-label">出勤率</text>
                    </svg>
                </div>
                <div class="stat-rows">
                    <div class="stat-row">
                        <span class="stat-label">出勤天數</span>
                        <span class="stat-value" id="sumAttendance">--</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">遲到 / 早退</span>
                        <span class="stat-value warn" id="sumLateEarly">--</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">本月總工時</span>
                        <span class="stat-value teal" id="sumWorkTotal">--</span>
                    </div>
                </div>
            </div>

            <!-- 小日曆 -->
            <div class="calendar-section" id="calendarSection">
                <div class="calendar-weekdays">
                    <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
                </div>
                <div class="calendar-grid" id="calendarGrid"></div>
                <div class="calendar-legend">
                    <span><i class="dot ok"></i>正常</span>
                    <span><i class="dot warn"></i>遲到／早退</span>
                    <span><i class="dot none"></i>未打卡</span>
                </div>
            </div>

            <!-- 點日期後顯示的單日明細 -->
            <div class="day-detail" id="dayDetail">
                <div class="dd-header">
                    <span class="dd-date" id="ddDate">--</span>
                    <span class="dd-status-pill" id="ddStatusPill">正常</span>
                </div>
                <div class="dd-times">
                    <div class="dd-item">
                        <div class="dd-label">上班</div>
                        <div class="dd-value" id="ddCheckIn">--:--</div>
                    </div>
                    <div class="dd-item">
                        <div class="dd-label">下班</div>
                        <div class="dd-value" id="ddCheckOut">--:--</div>
                    </div>
                    <div class="dd-item">
                        <div class="dd-label">工作時數</div>
                        <div class="dd-value" id="ddWorkHours">--</div>
                    </div>
                </div>
                <div class="dd-note" id="ddNote"></div>
            </div>

            <div class="status" id="statusBar">正在連接 LINE...</div>

        </div>
    </div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="../shared/config.js"></script>
    <script src="../shared/liff-utils.js?v=4"></script>
    <script>
        const statusBar = document.getElementById('statusBar');
        function setStatus(text, type) {
            statusBar.textContent = text;
            statusBar.className = 'status' + (type ? ' ' + type : '');
            statusBar.style.opacity = text ? '1' : '0';
        }

        // 目前畫面顯示中的年月（不能切到比今天所在月份更未來）
        const today = new Date();
        let viewYear = today.getFullYear();
        let viewMonth = today.getMonth() + 1; // 1~12
        let selectedDateStr = null;

        const monthLabel = document.getElementById('monthLabel');
        const btnPrev = document.getElementById('btnPrevMonth');
        const btnNext = document.getElementById('btnNextMonth');
        const calendarSection = document.getElementById('calendarSection');
        const overviewSection = document.getElementById('overviewSection');
        const dayDetail = document.getElementById('dayDetail');

        const RING_CIRCUMFERENCE = 238.8; // 2 * PI * 38，對應 SVG 圓環半徑

        function formatMinutesAsHM(totalMinutes) {
            const h = Math.floor(totalMinutes / 60);
            const m = totalMinutes % 60;
            return `${h} 小時 ${m} 分`;
        }

        function formatHM(iso) {
            return iso ? new Date(iso).toLocaleTimeString('zh-TW', { hour12: false, hour: '2-digit', minute: '2-digit' }) : null;
        }

        function isWarnStatus(day) {
            return !!(day && day.warn);
        }

        function renderMonthLabel() {
            monthLabel.innerHTML = `<span class="yr">${viewYear}</span>${viewMonth} 月`;
            const isCurrentMonth = (viewYear === today.getFullYear() && viewMonth === today.getMonth() + 1);
            btnNext.disabled = isCurrentMonth;
        }

        // 出勤率：用「本月已經過去的平日天數」當分母，而不是整月天數，
        // 避免月初或還沒過完的月份看起來出勤率異常偏低
        function countWeekdaysUpTo(year, month, lastConsideredDay) {
            let count = 0;
            for (let d = 1; d <= lastConsideredDay; d++) {
                const wd = new Date(year, month - 1, d).getDay();
                if (wd !== 0 && wd !== 6) count++;
            }
            return count;
        }

        function renderRing(attendanceDays, weekdayCount) {
            const rateNum = document.getElementById('rateNum');
            const rateArc = document.getElementById('rateArc');
            if (weekdayCount <= 0) {
                rateNum.textContent = '--';
                rateArc.style.strokeDashoffset = RING_CIRCUMFERENCE;
                return;
            }
            const rate = Math.min(1, attendanceDays / weekdayCount);
            rateNum.textContent = `${Math.round(rate * 100)}%`;
            rateArc.style.strokeDashoffset = String(RING_CIRCUMFERENCE * (1 - rate));
        }

        function hideDayDetail() {
            dayDetail.classList.remove('visible');
            dayDetail.classList.remove('has-warn');
            selectedDateStr = null;
            document.querySelectorAll('.calendar-day.is-selected').forEach(el => el.classList.remove('is-selected'));
        }

        // 找到整支函式，改成：
        function showDayDetail(dateStr, rec, cellEl, isWeekend, isAnomaly, leaveOnly) {
            document.querySelectorAll('.calendar-day.is-selected').forEach(el => el.classList.remove('is-selected'));
            cellEl.classList.add('is-selected');
            selectedDateStr = dateStr;

            const d = new Date(dateStr);
            document.getElementById('ddDate').textContent =
                `${d.getMonth() + 1} 月 ${d.getDate()} 日（${'日一二三四五六'[d.getDay()]}）`;

            const pill = document.getElementById('ddStatusPill');
            const ddTimes = document.querySelector('.dd-times');
            const ddNote = document.getElementById('ddNote');

            if (!rec) {
                if (ddTimes) ddTimes.style.display = 'none';
                const todayStr = Utilities_formatDate(today);
                const isFuture = dateStr > todayStr;
                const isToday = dateStr === todayStr;

                let statusKey, statusLabel, noteText;
                if (leaveOnly) {
                    statusKey = 'leave'; statusLabel = leaveOnly.label;
                    noteText = `這天已核准「${leaveOnly.label}」，不列入出勤異常。`;
                } else if (isWeekend) {
                    statusKey = 'none'; statusLabel = '例假日';
                    noteText = '非工作日，不列入出勤統計。';
                } else if (isFuture) {
                    statusKey = 'none'; statusLabel = '尚未發生';
                    noteText = '這天還沒到，尚無出勤資料。';
                } else if (isToday) {
                    statusKey = 'none'; statusLabel = '尚未打卡';
                    noteText = '今天目前還沒有打卡紀錄。';
                } else if (isAnomaly) {
                    statusKey = 'warn'; statusLabel = '未打卡異常';
                    noteText = '這天沒有任何打卡紀錄，請確認是否為漏打卡，必要時補登或申請假單。';
                } else {
                    statusKey = 'none'; statusLabel = '未打卡';
                    noteText = '這天沒有打卡紀錄。';
                }

                pill.textContent = statusLabel;
                pill.className = 'dd-status-pill' + (statusKey === 'warn' ? ' warn' : (statusKey === 'leave' ? ' leave' : ''));
                dayDetail.classList.toggle('has-warn', statusKey === 'warn');
                dayDetail.classList.toggle('has-leave', statusKey === 'leave');
                ddNote.textContent = noteText;
                ddNote.className = 'dd-note' + (statusKey === 'warn' ? ' dd-note-alert' : (statusKey === 'leave' ? ' dd-note-leave' : ' dd-note-muted'));
                dayDetail.classList.add('visible');
                return;
            }

            if (ddTimes) ddTimes.style.display = '';
            const warn = isWarnStatus(rec);
            pill.textContent = rec.hasLeave ? rec.leaveLabel : (rec.status || '正常');
            pill.className = 'dd-status-pill' + (rec.hasLeave ? ' leave' : (warn ? ' warn' : ''));
            dayDetail.classList.toggle('has-warn', warn);
            dayDetail.classList.toggle('has-leave', rec.hasLeave && !warn);

            document.getElementById('ddCheckIn').textContent = formatHM(rec.checkIn) || '--:--';
            document.getElementById('ddCheckOut').textContent = formatHM(rec.checkOut) || '--:--';
            document.getElementById('ddWorkHours').textContent = rec.workMinutes ? formatMinutesAsHM(rec.workMinutes) : '--';

            let noteText, noteClass = 'dd-note';
            if (rec.hasLeave && !warn) {
                noteText = `已核准「${rec.leaveLabel}」，不列入異常`;
                noteClass += ' dd-note-leave';
            } else if (rec.partial) {
                const base = LiffUtils.formatAttendanceNote(rec.lateMinutes, rec.earlyMinutes) || '';
                noteText = `當天已有核准假單，但未完全涵蓋${rec.leaveLabel || '異常'}的時段。${base}`;
                noteClass += ' dd-note-alert';
            } else {
                noteText = LiffUtils.formatAttendanceNote(rec.lateMinutes, rec.earlyMinutes) || '';
                noteClass += warn ? ' dd-note-alert' : '';
            }
            ddNote.textContent = noteText;
            ddNote.className = noteClass;

            dayDetail.classList.add('visible');
        }

        // 找到整支函式，改成：
        function renderCalendar(daysData, leaveOnlyDays, anomalyDates) {
            const calendarGrid = document.getElementById('calendarGrid');
            if (!calendarGrid) return;
            const byDate = {};
            daysData.forEach(d => { byDate[d.date] = d; });
            const leaveOnlyMap = {};
            (leaveOnlyDays || []).forEach(l => { leaveOnlyMap[l.date] = l; });
            const anomalySet = new Set(anomalyDates || []);

            const firstWeekday = new Date(viewYear, viewMonth - 1, 1).getDay();
            const totalDays = new Date(viewYear, viewMonth, 0).getDate();
            const todayStr = Utilities_formatDate(today);

            calendarGrid.innerHTML = '';
            hideDayDetail();

            for (let i = 0; i < firstWeekday; i++) {
                const pad = document.createElement('div');
                pad.className = 'calendar-day pad';
                calendarGrid.appendChild(pad);
            }

            for (let day = 1; day <= totalDays; day++) {
                const dateStr = `${viewYear}-${String(viewMonth).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const weekday = new Date(viewYear, viewMonth - 1, day).getDay();
                const rec = byDate[dateStr];
                const leaveOnly = leaveOnlyMap[dateStr];
                const isAnomaly = anomalySet.has(dateStr);
                const isWeekend = weekday === 0 || weekday === 6;

                const cell = document.createElement('div');
                cell.className = 'calendar-day';
                if (isWeekend) cell.classList.add('weekend');
                if (dateStr === todayStr) cell.classList.add('is-today');

                if (rec) {
                    cell.classList.add('has-record');
                    const warn = isWarnStatus(rec);
                    const dotClass = rec.hasLeave ? 'leave' : (warn ? 'warn' : 'ok');
                    const miniLabel = rec.hasLeave
                        ? rec.leaveLabel
                        : (rec.workMinutes > 0 ? `${(rec.workMinutes / 60).toFixed(1)}h` : (formatHM(rec.checkIn) || ''));
                    cell.innerHTML = `
                <span class="date-num">${day}</span>
                <span class="status-dot ${dotClass}"></span>
                <span class="mini-time">${miniLabel}</span>
            `;
                    cell.addEventListener('click', () => showDayDetail(dateStr, rec, cell, false, false, null));
                } else if (leaveOnly) {
                    cell.classList.add('leave-only');
                    cell.innerHTML = `
                <span class="date-num">${day}</span>
                <span class="status-dot leave"></span>
                <span class="mini-time">${leaveOnly.label}</span>
            `;
                    cell.addEventListener('click', () => showDayDetail(dateStr, null, cell, isWeekend, isAnomaly, leaveOnly));
                } else {
                    cell.classList.add('no-record');
                    if (isAnomaly) cell.classList.add('anomaly');
                    cell.innerHTML = `<span class="date-num">${day}</span>`;
                    cell.addEventListener('click', () => showDayDetail(dateStr, null, cell, isWeekend, isAnomaly, null));
                }

                calendarGrid.appendChild(cell);
            }
        }

        // 簡化版的日期字串格式化（避免額外依賴 GAS 的 Utilities）
        function Utilities_formatDate(d) {
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }

        function renderReport(data) {
            hideDayDetail();
            const s = data.summary;
            document.getElementById('sumAttendance').textContent = `${s.attendanceDays} 天`;
            document.getElementById('sumLateEarly').textContent = `${s.lateDays} / ${s.earlyDays}`;
            document.getElementById('sumWorkTotal').textContent = formatMinutesAsHM(s.totalWorkMinutes);

            const isCurrentMonth = (viewYear === today.getFullYear() && viewMonth === today.getMonth() + 1);
            const lastConsideredDay = isCurrentMonth ? today.getDate() : new Date(viewYear, viewMonth, 0).getDate();
            const weekdayCount = countWeekdaysUpTo(viewYear, viewMonth, lastConsideredDay);
            renderRing(s.attendanceDays, weekdayCount);

            if (!data.days || data.days.length === 0) {
                overviewSection.style.display = 'none';
                calendarSection.innerHTML = `
                    <div class="empty-month">
                        <div class="em-icon">◌</div>
                        這個月還沒有任何打卡紀錄
                    </div>
                `;
            } else {
                overviewSection.style.display = '';
                // 若日曆區塊先前被清空過（切到空月份後又切回來），重建結構
                if (!document.getElementById('calendarGrid')) {
                    calendarSection.innerHTML = `
                        <div class="calendar-weekdays">
                            <span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span>
                        </div>
                        <div class="calendar-grid" id="calendarGrid"></div>
                        <div class="calendar-legend">
                            <span><i class="dot ok"></i>正常</span>
                            <span><i class="dot warn"></i>遲到／早退</span>
                            <span><i class="dot none"></i>未打卡</span>
                        </div>
                    `;
                }
                renderCalendar(data.days, data.leaveOnlyDays, data.anomalyDates);
            }
        }

        async function loadReport() {
            renderMonthLabel();
            setStatus('讀取月報表中...', null);
            const requestYear = viewYear;
            const requestMonth = viewMonth;
            try {
                const data = await LiffUtils.getMonthlyReport(requestYear, requestMonth);
                // 回應回來時，如果使用者已經切去別的月份，這筆是舊回應，不要套用
                if (requestYear !== viewYear || requestMonth !== viewMonth) return;
                if (data.error) {
                    setStatus(data.message || '讀取月報表失敗', 'error');
                    return;
                }
                renderReport(data);
                setStatus('', null);
            } catch (err) {
                console.error(err);
                setStatus('連線錯誤，請稍後再試', 'error');
            }
        }

        btnPrev.addEventListener('click', () => {
            viewMonth--;
            if (viewMonth < 1) { viewMonth = 12; viewYear--; }
            loadReport();
        });

        btnNext.addEventListener('click', () => {
            if (btnNext.disabled) return;
            viewMonth++;
            if (viewMonth > 12) { viewMonth = 1; viewYear++; }
            loadReport();
        });

        async function start() {
            try {
                const profile = await LiffUtils.init();
                if (!profile) return; // 正在導轉去登入

                const avatarBox = document.getElementById('avatarBox');
                if (profile.pictureUrl) {
                    avatarBox.innerHTML = `<img src="${profile.pictureUrl}" alt="頭像" />`;
                } else {
                    avatarBox.innerHTML = `<span class="placeholder">${profile.displayName.charAt(0)}</span>`;
                }
                document.querySelector('.card').classList.add('ready');
                requestAnimationFrame(() => avatarBox.classList.add('loaded'));

                setStatus('已連接 LINE，查詢綁定狀態中...', null);
                const binding = await LiffUtils.checkBinding();

                if (binding.blocked) {
                    setStatus(binding.message, 'error');
                    return;
                }
                if (!binding.bound) {
                    setStatus('尚未綁定員工資料，即將前往綁定頁面...', null);
                    setTimeout(() => { window.location.href = '../bind/index.html'; }, 800);
                    return;
                }

                LiffUtils.empId = binding.empId;
                document.getElementById('userName').textContent = binding.empName;

                await loadReport();
            } catch (err) {
                console.error(err);
                setStatus('連接失敗，請確認 LIFF 或伺服器設定', 'error');
                document.querySelector('.card').classList.add('ready');
            }
        }

        start();
    </script>

</body>

</html>
