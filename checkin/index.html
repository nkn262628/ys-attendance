<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>出勤打卡 · Y's Cloud</title>
    <link rel="stylesheet" href="../assets/style.css" />
</head>

<body>

    <div class="screen">

        <div class="topbar">
            <span class="brand">Y'S CLOUD</span>
            <span class="sep">·</span>
            <span class="sub">出勤打卡</span>
        </div>

        <div class="card">

            <!-- 即時時鐘 -->
            <div class="clock">
                <div class="time" id="clockTime">--:--:--</div>
                <div class="date" id="clockDate">載入中</div>
            </div>

            <div class="divider"></div>

            <!-- 使用者資訊 -->
            <div class="profile">
                <div class="avatar" id="avatarBox">
                    <span class="placeholder">?</span>
                </div>
                <div class="info">
                    <div class="greeting">目前登入</div>
                    <div class="name" id="userName">尚未連接</div>
                    <div class="uid" id="userId"></div>
                </div>
            </div>

            <!-- 顯示今天時間的小欄位 -->
            <div class="today-summary">
                <div class="today-item">
                    <span class="today-label">上班</span>
                    <span class="today-time" id="todayIn">--:--</span>
                </div>
                <div class="today-item">
                    <span class="today-label">下班</span>
                    <span class="today-time" id="todayOut">--:--</span>
                </div>
            </div>

            <!-- 打卡印章 -->
            <div class="stamp-zone">
                <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" id="stampSvg">
                    <circle cx="60" cy="60" r="52" stroke="#D8DFDD" stroke-width="2" />
                    <circle cx="60" cy="60" r="52" stroke="#1F8F86" stroke-width="2.5" stroke-dasharray="326.7"
                        stroke-dashoffset="326.7" id="stampRing" stroke-linecap="round" transform="rotate(-90 60 60)" />
                    <!-- 分鐘刻度 -->
                    <g stroke="#B9C4C2" stroke-width="1.5">
                        <line x1="60" y1="12" x2="60" y2="18" />
                        <line x1="60" y1="102" x2="60" y2="108" />
                        <line x1="12" y1="60" x2="18" y2="60" />
                        <line x1="102" y1="60" x2="108" y2="60" />
                    </g>
                    <text x="60" y="66" text-anchor="middle" font-family="Space Grotesk, sans-serif" font-weight="600"
                        font-size="13" fill="#14293D" id="stampText">尚未打卡</text>
                </svg>
                <div class="stamp-label" id="stampLabel">等待 LINE 連接後即可打卡</div>
            </div>

            <!-- 動作按鈕 -->
            <div class="actions">
                <button class="btn btn-primary" id="btnCheckIn" disabled>上班打卡</button>
                <button class="btn btn-ghost" id="btnCheckOut" disabled>下班打卡</button>
            </div>

            <!-- 狀態列 -->
            <div class="status" id="statusBar">正在連接 LINE...</div>

            <!-- 測試用：登出重新測試登入流程，正式上線前移除 -->
            <!-- <div class="dev-tool">
                <button id="btnLogout">登出，重新測試登入流程</button>
            </div> -->

        </div>
    </div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="../shared/config.js"></script>
    <script src="../shared/liff-utils.js?v=2"></script>
    <script>
        // 即時時鐘
        function updateClock() {
            const now = new Date();
            const time = now.toLocaleTimeString('zh-TW', { hour12: false });
            const date = now.toLocaleDateString('zh-TW', {
                year: 'numeric', month: 'long', day: 'numeric', weekday: 'short'
            });
            document.getElementById('clockTime').textContent = time;
            document.getElementById('clockDate').textContent = date;
        }
        updateClock();
        setInterval(updateClock, 1000);

        const statusBar = document.getElementById('statusBar');

        function setStatus(text, type, autoHide) {
            statusBar.textContent = text;
            statusBar.className = 'status' + (type ? ' ' + type : '');
            statusBar.style.opacity = '1';
            if (autoHide) {
                clearTimeout(setStatus._t);
                setStatus._t = setTimeout(() => {
                    statusBar.style.opacity = '0';
                }, 2500);
            }
        }

        function renderTodayStatus(status) {
            const inBtn = document.getElementById('btnCheckIn');
            const outBtn = document.getElementById('btnCheckOut');
            const inTime = document.getElementById('todayIn');
            const outTime = document.getElementById('todayOut');

            if (status.checkIn) {
                const t = new Date(status.checkIn).toLocaleTimeString('zh-TW', { hour12: false });
                inTime.textContent = t;
                inTime.closest('.today-item').classList.add('filled');
                inBtn.disabled = true;
                inBtn.textContent = '已完成上班打卡';
            } else {
                inTime.textContent = '--:--';
                inBtn.disabled = false;
                inBtn.textContent = '上班打卡';
            }

            if (status.checkOut) {
                const t = new Date(status.checkOut).toLocaleTimeString('zh-TW', { hour12: false });
                outTime.textContent = t;
                outTime.closest('.today-item').classList.add('filled');
                outBtn.disabled = true;
                outBtn.textContent = '已完成下班打卡';
            } else {
                outBtn.disabled = !status.checkIn;
                outBtn.textContent = '下班打卡';
            }

            // 印章狀態也統一在這裡決定，不再各處分散設定
            const stampText = document.getElementById('stampText');
            const stampLabel = document.getElementById('stampLabel');
            const stampRing = document.getElementById('stampRing');

            if (status.checkOut) {
                stampText.textContent = '本日已完成';
                stampLabel.textContent = '辛苦了，今天出勤已完成';
                stampRing.style.strokeDashoffset = '0';
            } else if (status.checkIn) {
                stampText.textContent = '上班已打卡';
                stampLabel.textContent = '準備下班打卡';
                stampRing.style.strokeDashoffset = '0';
            } else {
                stampText.textContent = '尚未打卡';
                stampLabel.textContent = '準備打卡';
                stampRing.style.strokeDashoffset = '326.7';
            }
        }

        async function start() {
            try {
                document.querySelectorAll('.today-item, .stamp-zone svg').forEach(el => {
                    el.classList.add('loading-pulse');
                });
                const profile = await LiffUtils.init();
                if (!profile) return; // 正在導轉去登入

                document.getElementById('userName').textContent = profile.displayName;
                document.getElementById('userId').textContent = 'LINE ID: ' + profile.userId;

                const avatarBox = document.getElementById('avatarBox');
                if (profile.pictureUrl) {
                    avatarBox.innerHTML = `<img src="${profile.pictureUrl}" alt="頭像" />`;
                } else {
                    avatarBox.innerHTML = `<span class="placeholder">${profile.displayName.charAt(0)}</span>`;
                }

                document.querySelector('.card').classList.add('ready');
                requestAnimationFrame(() => avatarBox.classList.add('loaded'));

                // 查詢是否已綁定員工資料
                setStatus('已連接 LINE，查詢綁定狀態中...', null);
                const binding = await LiffUtils.checkBinding();

                //  查詢完停止呼吸動畫
                document.querySelectorAll('.today-item, .stamp-zone svg').forEach(el => {
                    el.classList.remove('loading-pulse');
                });

                if (binding.blocked) {
                    setStatus(binding.message, 'error');
                } else if (binding.bound) {
                    LiffUtils.empId = binding.empId;
                    document.getElementById('userName').textContent = binding.empName;
                    setStatus('已綁定，歡迎回來', 'ok', true);

                    const today = await LiffUtils.getStatus();
                    renderTodayStatus(today);
                } else {
                    setStatus('尚未綁定員工資料，即將前往綁定頁面...', null);
                    setTimeout(() => {
                        window.location.href = '../bind/index.html';
                    }, 800);
                }

            } catch (err) {
                console.error(err);
                setStatus('連接失敗，請確認 LIFF 或伺服器設定', 'error');
                document.querySelector('.card').classList.add('ready');

                document.querySelectorAll('.today-item, .stamp-zone svg').forEach(el => {
                    el.classList.remove('loading-pulse');
                });
            }
        }

        // 測試用：登出後重新整理頁面，會重新觸發登入流程
        // document.getElementById('btnLogout').addEventListener('click', () => {
        //     liff.logout();
        //     window.location.reload();
        // });

        // 按下按鈕先做視覺回饋，之後這裡會換成真正呼叫 Kintone API
        document.getElementById('btnCheckIn').addEventListener('click', async () => {
            const btn = document.getElementById('btnCheckIn');
            btn.disabled = true;
            setStatus('定位中...', null);
            try {
                const coords = await getCoords();
                setStatus('打卡處理中...', null);
                const result = await LiffUtils.punch('IN', coords);
                if (result.success) {
                    setStatus('上班打卡成功', 'ok', true);
                    renderTodayStatus(await LiffUtils.getStatus());
                } else {
                    setStatus(result.message, 'error');
                    btn.disabled = false;
                }
            } catch (err) {
                console.error(err);
                setStatus('連線錯誤，請稍後再試', 'error');
                btn.disabled = false;
            }
        });

        function getCoords() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    alert('瀏覽器不支援定位');
                    return resolve(null);
                }
                navigator.geolocation.getCurrentPosition(
                    pos => resolve({ lat: pos.coords.latitude, lng: pos.coords.longitude }),
                    (err) => {
                        alert('定位失敗，代碼：' + err.code + '，訊息：' + err.message);
                        resolve(null);
                    },
                    { timeout: 8000 }
                );
            });
        }

        document.getElementById('btnCheckOut').addEventListener('click', async () => {
            const btn = document.getElementById('btnCheckOut');
            btn.disabled = true;
            setStatus('定位中...', null);
            try {
                const coords = await getCoords();
                setStatus('打卡處理中...', null);
                const result = await LiffUtils.punch('OUT', coords);
                if (result.success) {
                    setStatus('下班打卡成功', 'ok', true);
                    renderTodayStatus(await LiffUtils.getStatus());
                } else {
                    setStatus(result.message, 'error');
                    btn.disabled = false;
                }
            } catch (err) {
                console.error(err);
                setStatus('連線錯誤，請稍後再試', 'error');
                btn.disabled = false;
            }
        });

        start();
    </script>

</body>

</html>
